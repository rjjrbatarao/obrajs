<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/all.min.css" />
    <link rel="stylesheet" href="css/framework.css" />
    <link rel="stylesheet" href="css/master.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        margin: 0;
        background: #f1f5f9;
        height: 100vh;
      }

      .login-page {
        height: 100vh;
      }

      .login-box {
        width: 380px;
        background: #fff;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      }

      .logo {
        width: 70px;
        height: 70px;
        background: var(--blue-color);
        color: #fff;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 30px;
        margin: auto;
      }

      .form-control {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
        outline: none;
        font-size: 15px;
        transition: 0.2s;
      }

      .form-control:focus {
        border-color: var(--blue-color);
      }

      .login-btn {
        width: 100%;
        padding: 15px 20px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        border: none;
        border-radius: 6px;
        transition: 0.3s;
      }

      .login-btn:hover {
        background: var(--blue-alt-color);
      }

      .login-footer {
        text-align: center;
        margin-top: 20px;
        color: var(--grey-color);
        font-size: 13px;
        line-height: 1.5;
      }

      a {
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="login-page center-flex" id="login"></div>
  </body>
  <script src="js/obrajs.js"></script>
  <script src="js/app.js"></script>
</html>
