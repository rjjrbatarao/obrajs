<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/all.min.css" />
    <link rel="stylesheet" href="css/framework.css" />
    <link rel="stylesheet" href="css/master.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page d-flex">
      <!-- Start Sidebar -->
      <div class="sidebar bg-white p-20 p-relative" id="dashboard"></div>
      <!-- End Sidebar -->
      <div class="content w-full overflow-hidden">
        <!-- Start Head -->
        <div class="head bg-white p-15 between-flex">
          <div class="p-relative">
            <input
              class="p-5 txt-c main-border rad-10"
              placeholder="Status: Running"
              disabled
            />
          </div>
          <div class="icons d-flex align-center">
            <span class="notification p-relative">
              <i class="fa-regular fa-bell fa-lg"></i>
            </span>
            <img src="imgs/avatar.png" alt="" />
          </div>
        </div>
        <!-- End Head -->
        <h1 class="p-relative">Dashboard</h1>
        <div id="widgets_half"></div>
        <div id="widgets_full"></div>
      </div>
    </div>
  </body>
  <script src="js/obrajs.js"></script>
  <script src="js/app.js"></script>
</html>
